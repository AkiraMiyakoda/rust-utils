name: Rust

on:
    pull_request:
        types:
            - opened
            - reopened
    push:

jobs:
    logger:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./logger
        steps:
            - name: Checkout Crate
              uses: actions/checkout@v4
            - name: Set Toolchain
              uses: dtolnay/rust-toolchain@stable
            - name: Install clippy
              run: rustup component add clippy
            - name: cargo check
              run: cargo check
            - name: cargo clippy
              run: cargo clippy

    format:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./format
        steps:
            - name: Checkout Crate
              uses: actions/checkout@v4
            - name: Set Toolchain
              uses: dtolnay/rust-toolchain@stable
            - name: Install clippy
              run: rustup component add clippy
            - name: cargo check
              run: cargo check
            - name: cargo clippy
              run: cargo clippy
